<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OXI | Hub & AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#070910;--panel:rgba(255,255,255,0.06);--card:#0f172a;--text:#e8edf7;--muted:#9aa4c6;--accent:#7cf7d4;--accent2:#7cb7f7;--border:rgba(255,255,255,0.08);}
    *{box-sizing:border-box; scroll-behavior: smooth;}
    body{margin:0;color:var(--text);font-family:"Manrope",system-ui;background:radial-gradient(1200px at 10% 20%,rgba(124,247,212,.15),transparent 60%),var(--bg); min-height: 100vh;}
    
    /* Header */
    header{position:sticky;top:0;z-index:100;background:rgba(7,9,16,.8);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;}
    .logo{font-family:"Space Grotesk",system-ui;font-weight:700; font-size:1.2rem; color:var(--accent);}
    nav a{color:var(--muted);text-decoration:none;font-weight:700;margin-left:20px;font-size: 14px; transition:0.2s;} 
    nav a:hover{color:var(--accent);}

    /* UI Elements */
    .btn{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#041025;border:none;padding:10px 20px;border-radius:12px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-block; transition:0.3s;}
    .btn:hover{transform:scale(1.05); box-shadow:0 0 15px rgba(124,247,212,0.4);}
    
    main{max-width:1100px;margin:32px auto;padding:0 20px;}
    .hero{background:var(--panel);border:1px solid var(--border);border-radius:24px;padding:40px;margin-bottom:40px;text-align:center;}
    
    /* Blog & Apps Grid */
    .grid{display:grid;gap:20px;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));}
    .card{background:var(--card);border:1px solid var(--border);padding:24px;border-radius:20px;position:relative; transition:0.3s;}
    .card:hover{border-color:var(--accent); background:rgba(15,23,42,0.8);}
    .tag{font-size:10px; text-transform:uppercase; background:rgba(124,247,212,0.1); color:var(--accent); padding:4px 8px; border-radius:6px; margin-bottom:12px; display:inline-block; font-weight:700;}
    
    /* AI Assistant Section */
    .ai-section{background:linear-gradient(135deg, rgba(124,183,247,0.1), rgba(124,247,212,0.05)); border:1px solid var(--accent2); border-radius:24px; padding:30px; margin-top:60px;}
    #ai-response{background:rgba(0,0,0,0.3); border-radius:12px; padding:15px; margin-top:15px; min-height:50px; font-size:14px; border-left:3px solid var(--accent2); display:none;}
    input[type="text"]{background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:10px; padding:12px; color:white; width:70%; margin-right:10px;}

    .is-locked .btn-action{pointer-events:none; opacity:0.3;}
    .lock-msg{font-size:12px; color:var(--muted); margin-top:10px; display:block;}
    .is-unlocked .lock-msg{display:none;}
  </style>
</head>
<body class="is-locked">
  <header>
    <div class="logo">OXI_PROJECT</div>
    <nav>
      <a href="#feed">Blog & Apps</a>
      <a href="#ai-help">AI Destek</a>
      <a href="#games">Oyunlar</a>
    </nav>
    <div id="auth-area">
      <div id="g_id_onload" data-client_id="980583011173-nf81b7cj5k36b3m14v0gv7mv59asfk7t.apps.googleusercontent.com" data-callback="onGoogleSignIn"></div>
      <div class="g_id_signin" data-type="standard"></div>
      <button class="btn" id="signout" style="display:none;" onclick="signOut()">Çıkış</button>
    </div>
  </header>

  <main>
    <section class="hero">
      <h1>ByteShift Hub</h1>
      <p>Yazılım projeleri, Android optimizasyonları ve teknoloji günlüğü.</p>
    </section>

    <h2 id="feed">Son Paylaşımlar</h2>
    <div class="grid" id="main-feed">
      </div>

    <section id="ai-help" class="ai-section">
      <h3>🤖 OXI AI Asistan</h3>
      <p style="font-size:14px; color:var(--muted);">Projem hakkında sorular sorabilirsin. (Not: Statik modda çalışır)</p>
      <div style="display:flex;">
        <input type="text" id="ai-input" placeholder="ByteShift nedir? / Nasıl kurulur?">
        <button class="btn" onclick="askAI()">Sor</button>
      </div>
      <div id="ai-response"></div>
    </section>

    <section id="games" style="margin-top:60px;">
      <h2>Mini Oyunlar</h2>
      <iframe src="https://itch.io/embed-upload/15327480?color=070910" width="100%" height="450" style="border-radius:20px; border:1px solid var(--border);"></iframe>
    </section>
  </main>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script>
    // BİRLEŞİK VERİ SETİ (Blog + Uygulamalar)
    const contentData = [
      { type: 'Uygulama', title: 'Android x86 Optimize Tool v1.0', desc: 'Android-x86 sistemler için FPS artırıcı ve kernel düzenleyici.', link: 'apps/tool.zip', date: 'Mart 2026' },
      { type: 'Blog', title: 'ByteShift Geliştirme Günlüğü #1', desc: 'Sistemi Waydroid üzerine nasıl inşa ettiğimi anlatıyorum.', link: '#', date: 'Mart 2026' },
      { type: 'Uygulama', title: 'Oxi Termux Theme', desc: 'Termux için özel hazırlanmış Matrix stili tema paketi.', link: 'apps/theme.sh', date: 'Şubat 2026' },
      { type: 'Blog', title: 'Samsung PM991a İncelemesi', desc: 'Fiyat/performans canavarı bu SSD hakkında her şey.', link: '#', date: 'Ocak 2026' }
    ];

    function loadContent() {
      const feed = document.getElementById('main-feed');
      feed.innerHTML = contentData.map(item => `
        <article class="card">
          <span class="tag">${item.type}</span>
          <h3>${item.title}</h3>
          <p style="color:var(--muted); font-size:14px;">${item.desc}</p>
          <div style="margin-top:20px; display:flex; justify-content:space-between; align-items:center;">
            <a href="${item.link}" class="btn btn-action">${item.type === 'Uygulama' ? 'İndir' : 'Oku'}</a>
            <span class="lock-msg">🔒 Giriş Gerekli</span>
          </div>
        </article>
      `).join('');
    }

    // YAPAY ZEKA YARDIM FONKSİYONU (Statik Versiyon)
    function askAI() {
      const input = document.getElementById('ai-input').value.toLowerCase();
      const responseBox = document.getElementById('ai-response');
      responseBox.style.display = "block";
      
      let answer = "Üzgünüm, bu konuda henüz eğitilmedim. ByteShift veya projelerim hakkında sorabilirsin.";

      if(input.includes("byteshift")) {
        answer = "ByteShift, Windows, Android ve macOS uygulamalarını Linux üzerinde yerel hızda çalıştırmayı hedefleyen benim geliştirdiğim bir işletim sistemi projesidir.";
      } else if(input.includes("kurulum") || input.includes("nasıl")) {
        answer = "Kurulum için yayınladığım .sh scriptlerini kullanabilirsin. Şu an sadece Alpine Linux tabanlı sistemlerde stabil çalışıyor.";
      } else if(input.includes("kim") || input.includes("oxi")) {
        answer = "Ben Oxi! 9. sınıf öğrencisiyim ve geleceğin bilgisayar mühendisiyim. Bu site benim projelerimi sergilediğim alanım.";
      }

      responseBox.innerHTML = `<strong>Asistan:</strong> ${answer}`;
    }

    // AUTH İŞLEMLERİ
    function onGoogleSignIn(response){
      const payload = JSON.parse(atob(response.credential.split('.')[1]));
      document.body.classList.replace('is-locked', 'is-unlocked');
      document.querySelector('.g_id_signin').style.display='none';
      document.getElementById('signout').style.display='block';
      console.log("Giriş yapıldı:", payload.name);
    }

    function signOut(){
      location.reload();
    }

    window.onload = loadContent;
  </script>
</body>
</html>
