<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OXI | Hub & AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#070910;--panel:rgba(255,255,255,0.06);--card:#0f172a;--text:#e8edf7;--muted:#9aa4c6;--accent:#7cf7d4;--accent2:#7cb7f7;--border:rgba(255,255,255,0.08);}
    *{box-sizing:border-box;scroll-behavior:smooth;}
    body{margin:0;color:var(--text);font-family:"Manrope",system-ui;background:radial-gradient(1200px at 10% 20%,rgba(124,247,212,.15),transparent 60%),var(--bg);min-height:100vh;}
    header{position:sticky;top:0;z-index:100;background:rgba(7,9,16,.8);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;}
    .logo-container{display:flex;align-items:center;gap:12px;text-decoration:none;}
    .logo-img{width:35px;height:35px;border-radius:8px;object-fit:cover;border:1px solid var(--accent);}
    .logo-text{font-family:"Space Grotesk",system-ui;font-weight:700;font-size:1.3rem;color:var(--accent);letter-spacing:1px;}
    nav a{color:var(--muted);text-decoration:none;font-weight:700;margin-left:20px;font-size:14px;transition:.2s;}
    nav a:hover{color:var(--accent);}
    .btn{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#041025;border:none;padding:10px 20px;border-radius:12px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-block;transition:.3s;}
    .btn.secondary{background:transparent;color:var(--accent2);border:1px solid var(--accent2);}
    main{max-width:1100px;margin:32px auto;padding:0 20px;}
    .hero{background:var(--panel);border:1px solid var(--border);border-radius:24px;padding:40px;margin-bottom:40px;text-align:center;}
    .grid{display:grid;gap:20px;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));}
    .card{background:var(--card);border:1px solid var(--border);padding:24px;border-radius:20px;transition:.3s;}
    .card:hover{border-color:var(--accent);transform:translateY(-5px);}
    .tag{font-size:10px;text-transform:uppercase;background:rgba(124,247,212,.1);color:var(--accent);padding:4px 8px;border-radius:6px;margin-bottom:12px;display:inline-block;font-weight:700;}
    .ai-section,.profile-section{background:linear-gradient(135deg, rgba(124,183,247,0.1), rgba(124,247,212,0.05));border:1px solid var(--accent2);border-radius:24px;padding:30px;margin-top:60px;}
    #ai-response{background:rgba(0,0,0,.3);border-radius:12px;padding:15px;margin-top:15px;display:none;border-left:3px solid var(--accent2);font-size:14px;white-space:pre-wrap;}
    input[type="text"], textarea, select{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:10px;padding:12px;color:white;width:100%;}
    textarea{min-height:120px;resize:vertical;}
    .row{display:flex;gap:10px;align-items:center;}
    .muted{color:var(--muted);font-size:13px;margin-top:8px;}
  </style>
</head>
<body>
  <header>
    <a href="#" class="logo-container">
      <img src="assets/logo.png" alt="L" class="logo-img">
      <div class="logo-text">OXI_PROJECT</div>
    </a>
    <nav>
      <a href="#blog">Blog</a>
      <a href="#ai-help">AI Destek</a>
      <a href="#profile">Profil</a>
      <a href="#games">Oyunlar</a>
    </nav>
    <div id="auth-area">
      <div id="g_id_onload" data-client_id="980583011173-nf81b7cj5k36b3m14v0gv7mv59asfk7t.apps.googleusercontent.com" data-callback="onGoogleSignIn"></div>
      <div class="g_id_signin" data-type="standard"></div>
      <button class="btn" id="signout" style="display:none;" onclick="signOut()">Çıkış</button>
    </div>
  </header>

  <main>
    <section class="hero">
      <h1>ByteShift Blog</h1>
      <p>Geleceğin mühendisinden teknoloji notları ve geliştirme günlükleri.</p>
    </section>

    <h2 id="blog">Son Yazılar</h2>
    <div class="grid" id="main-feed"></div>

    <section id="ai-help" class="ai-section">
      <h3>🤖 OXI AI Asistan</h3>
      <div class="row">
        <input type="text" id="ai-input" placeholder="ByteShift projesi nedir?">
        <select id="ai-provider" style="max-width:180px;">
          <option value="chatgpt">ChatGPT</option>
          <option value="gemini">Gemini</option>
        </select>
        <button class="btn" id="ai-ask">Sor</button>
      </div>
      <div id="ai-response"></div>
    </section>

    <section id="profile" class="profile-section" style="display:none;">
      <h3>👤 Profil</h3>
      <p class="muted">Profilin GitHub deposuna güvenli API üzerinden kaydedilir.</p>
      <div style="display:grid;gap:10px;max-width:640px;">
        <input type="text" id="profile-name" placeholder="Adın">
        <textarea id="profile-bio" placeholder="Kısa biyografi"></textarea>
      </div>
      <div style="margin-top:12px;display:flex;gap:10px;align-items:center;">
        <button class="btn" id="profile-save">Profili Kaydet</button>
        <span id="profile-status" class="muted"></span>
      </div>
    </section>

    <section id="games" style="margin-top:60px;">
      <h2>Mola Zamanı</h2>
      <iframe src="https://itch.io/embed-upload/15327480?color=070910" width="100%" height="450" style="border-radius:20px;border:1px solid var(--border);"></iframe>
    </section>
  </main>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script>
    const state = { user: null };

    const blogData = [
      { title: 'ByteShift Geliştirme Günlüğü #1', desc: 'Android ve Windows uygulamalarını Linux üzerinde nasıl birleştiriyorum?', date: '15 Mart 2026' },
      { title: 'Samsung PM991a Neden Alınmalı?', desc: 'Fiyat performans canavarı SSD incelemem.', date: '10 Mart 2026' },
      { title: 'Pardus ve Alpine Linux Karşılaştırması', desc: 'Hafiflik ve yerellik arasında bir denge kurmak.', date: '1 Mart 2026' }
    ];

    function loadBlog() {
      const feed = document.getElementById('main-feed');
      feed.innerHTML = blogData.map(post => `
        <article class="card">
          <span class="tag">Teknoloji</span>
          <h3>${post.title}</h3>
          <p style="color:var(--muted);font-size:14px;">${post.desc}</p>
          <div style="margin-top:20px;display:flex;justify-content:space-between;align-items:center;">
            <span style="font-size:12px;color:var(--muted);">${post.date}</span>
            <a href="#" class="btn" style="padding:6px 12px;font-size:12px;">Devamını Oku</a>
          </div>
        </article>
      `).join('');
    }

    async function askAI() {
      const question = document.getElementById('ai-input').value.trim();
      const provider = document.getElementById('ai-provider').value;
      const responseBox = document.getElementById('ai-response');
      if (!question) return;
      responseBox.style.display = 'block';
      responseBox.textContent = 'Yanıt hazırlanıyor...';
      try {
        const res = await fetch(`/api/help/${provider}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question })
        });
        if (!res.ok) throw new Error('request-failed');
        const data = await res.json();
        responseBox.innerHTML = `<strong>Asistan:</strong> ${data.answer || 'Yanıt alınamadı.'}`;
      } catch (e) {
        responseBox.textContent = 'Şu an yanıt alınamadı. Lütfen tekrar dene.';
      }
    }

    function decodeJwt(token) {
      const base64Url = token.split('.')[1];
      const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
      const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
        return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
      }).join(''));
      return JSON.parse(jsonPayload);
    }

    async function loadProfileRemote(email){
      try{
        const res = await fetch(`/api/profile/get?email=${encodeURIComponent(email)}`);
        if(!res.ok) throw new Error();
        return await res.json();
      }catch{
        return null;
      }
    }

    async function saveProfileRemote(email, profile){
      const res = await fetch('/api/profile/save', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ email, profile })
      });
      if(!res.ok) throw new Error('save-failed');
    }

    async function onGoogleSignIn(response){
      const payload = decodeJwt(response.credential);
      state.user = {
        email: payload.email,
        name: payload.name
      };

      document.querySelector('.g_id_signin').style.display='none';
      document.getElementById('signout').style.display='inline-block';
      document.getElementById('profile').style.display='block';

      const remote = await loadProfileRemote(state.user.email);
      document.getElementById('profile-name').value = remote?.name || state.user.name || '';
      document.getElementById('profile-bio').value = remote?.bio || '';
      document.getElementById('profile-status').textContent = 'Giriş başarılı.';
    }

    function signOut() {
      state.user = null;
      location.reload();
    }

    document.getElementById('ai-ask').addEventListener('click', askAI);
    document.getElementById('profile-save').addEventListener('click', async () => {
      if (!state.user) return;
      const name = document.getElementById('profile-name').value.trim();
      const bio = document.getElementById('profile-bio').value.trim();
      try {
        await saveProfileRemote(state.user.email, { name, bio });
        document.getElementById('profile-status').textContent = 'GitHub’a kaydedildi.';
      } catch (e) {
        document.getElementById('profile-status').textContent = 'Kaydedilemedi, sonra tekrar dene.';
      }
    });

    window.onload = loadBlog;
  </script>
</body>
</html>
