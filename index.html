<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OXI | Tech Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#05070d; --card:#0c1220; --line:#1d2a45; --text:#eaf1ff; --muted:#99aac7; --accent:#56f0c2; --accent2:#6ea8ff; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Inter,system-ui,sans-serif; background:radial-gradient(1000px 400px at 20% -20%, #11203f 5%, transparent 60%), var(--bg); color:var(--text); }
    .wrap { max-width:1120px; margin:auto; padding:24px; }
    .top { display:flex; justify-content:space-between; align-items:center; gap:12px; position:sticky; top:0; backdrop-filter:blur(10px); background:rgba(5,7,13,.8); border-bottom:1px solid #1a263f; z-index:8; padding:14px 24px; }
    .brand { display:flex; gap:12px; align-items:center; font-weight:800; letter-spacing:.5px; }
    .brand img { width:34px; height:34px; border-radius:10px; border:1px solid #34507f; }
    .chips { display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }
    .chip { border:1px solid var(--line); color:var(--muted); border-radius:999px; font-size:12px; padding:6px 10px; }
    .grid { display:grid; gap:18px; grid-template-columns:1.2fr .8fr; }
    .card { background:linear-gradient(180deg, #0f182b, #0b1120); border:1px solid var(--line); border-radius:16px; padding:18px; }
    h1,h2,h3 { margin:0 0 10px; }
    .muted { color:var(--muted); }
    .btn { border:none; border-radius:12px; padding:10px 14px; font-weight:700; cursor:pointer; background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#04222b; }
    .btn.ghost { background:transparent; color:var(--muted); border:1px solid var(--line); }
    input, textarea, select { width:100%; background:#0b1426; color:var(--text); border:1px solid var(--line); border-radius:10px; padding:11px; margin-top:8px; }
    textarea { min-height:110px; }
    .row { display:flex; gap:10px; align-items:center; }
    .list { display:grid; gap:12px; margin-top:10px; }
    .post { border:1px solid var(--line); border-radius:14px; padding:14px; background:#0a1324; }
    .media { display:flex; gap:10px; flex-wrap:wrap; margin-top:10px; }
    .media img,.media video { width:220px; border-radius:12px; border:1px solid var(--line); }
    .media a { color:#93c5fd; font-size:13px; }
    .small { font-size:12px; }
    @media (max-width:900px){ .grid { grid-template-columns:1fr; } .top{position:static;} }
  </style>
</head>
<body>
  <header class="top">
    <div class="brand"><img src="assets/logo.png" alt="logo"> OXI_PROJECT</div>
    <div id="auth"></div>
  </header>

  <main class="wrap" id="app"></main>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script>
    const state = { user:null, idToken:null, blog:[], apps:[], files:[] };
    const ADMIN_EMAIL = ''; // İsteğe bağlı: sadece UI kontrolü, asıl kontrol backend'de ADMIN_EMAIL env ile yapılır.

    const el = (tag, attrs={}, html='') => {
      const n = document.createElement(tag);
      Object.entries(attrs).forEach(([k,v]) => k === 'class' ? n.className = v : n.setAttribute(k,v));
      if (html) n.innerHTML = html;
      return n;
    };

    function decodeJwt(token){
      const p = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
      return JSON.parse(decodeURIComponent(atob(p).split('').map(c => `%${('00' + c.charCodeAt(0).toString(16)).slice(-2)}`).join('')));
    }

    function formatBytes(bytes){
      if (!bytes) return '0 B';
      const units=['B','KB','MB','GB'];
      let i=0,v=bytes;
      while(v>=1024&&i<units.length-1){v/=1024;i++;}
      return `${v.toFixed(1)} ${units[i]}`;
    }

    async function api(url, opts={}){
      const res = await fetch(url, opts);
      if (!res.ok) throw new Error(await res.text());
      return res.json();
    }

    async function loadBlog(){
      const data = await api('/api/blog/list');
      state.blog = data.posts || [];
    }

    async function loadApps(){
      const data = await api('/api/apps/list');
      state.apps = data.apps || [];
    }

    function renderAuth(){
      const area = document.getElementById('auth');
      area.innerHTML = '';
      if (!state.user) {
        area.innerHTML = `<div id="g_id_onload" data-client_id="980583011173-nf81b7cj5k36b3m14v0gv7mv59asfk7t.apps.googleusercontent.com" data-callback="onGoogleSignIn"></div><div class="g_id_signin" data-type="standard"></div>`;
        return;
      }
      const box = el('div', { class:'row' }, `<span class="small muted">${state.user.email}</span>`);
      const out = el('button', { class:'btn ghost' }, 'Çıkış');
      out.onclick = () => { state.user=null; state.idToken=null; renderAuth(); render(); };
      box.appendChild(out); area.appendChild(box);
    }

    async function uploadFiles(section){
      const uploaded = [];
      for (const f of state.files) {
        const base64 = await fileToBase64(f.file);
        const data = await api('/api/uploads/save', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ idToken: state.idToken, fileName: f.file.name, mimeType: f.file.type, size: f.file.size, base64, section })
        });
        uploaded.push(data.file);
      }
      return uploaded;
    }

    function fileToBase64(file){
      return new Promise((resolve,reject)=>{
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result).split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function render(){
      const app = document.getElementById('app');
      app.innerHTML = '';

      const hero = el('section', { class:'card' }, `<h1>Modern Teknoloji Merkezi</h1><p class="muted">Blog, AI destek ve uygulama paylaşımları tek panelde.</p><div class="chips"><span class="chip">AI Asistan</span><span class="chip">Blog Yayınlama</span><span class="chip">Güvenli Profil</span></div>`);

      const grid = el('section', { class:'grid' });
      const left = el('div');
      const right = el('div');

      const blogCard = el('div', { class:'card' }, `<h2>Blog</h2><p class='muted'>Yazılar artık uzak depodan yüklenir.</p><div id='blog-list' class='list'></div>`);
      const list = blogCard.querySelector('#blog-list');
      if (!state.blog.length) list.innerHTML = `<div class='post small muted'>Henüz yazı yok.</div>`;
      state.blog.forEach(p => {
        const mediaHtml = (p.media || []).map(m => {
          if ((m.mimeType || '').startsWith('image/')) return `<img src='${m.url}' alt='görsel'>`;
          if ((m.mimeType || '').startsWith('video/')) return `<video src='${m.url}' controls></video>`;
          return `<a href='${m.url}' target='_blank' rel='noreferrer'>📎 ${m.name || 'Dosya'} (${formatBytes(m.size)})</a>`;
        }).join('');
        const node = el('article', { class:'post' }, `<h3>${p.title}</h3><p class='small muted'>${new Date(p.createdAt).toLocaleString('tr-TR')} · ${p.author?.name || p.author?.email || 'yazar'}</p><p>${p.content}</p><div class='media'>${mediaHtml}</div>`);
        list.appendChild(node);
      });
      left.appendChild(blogCard);

      const blogComposer = el('div', { class:'card' }, `<h3>Yeni Blog Yazısı</h3><p class='small muted'>Yazı başına toplam dosya sınırı: 150 MB.</p>`);
      if (!state.user) {
        blogComposer.appendChild(el('p', { class:'small muted' }, 'Yazı paylaşmak için Google ile giriş yap.'));
      } else {
        const title = el('input', { placeholder:'Başlık' });
        const content = el('textarea', { placeholder:'Yazı içeriği' });
        const files = el('input', { type:'file', multiple:'multiple' });
        const stat = el('div', { class:'small muted' });
        files.onchange = () => {
          state.files = [...files.files].map(file => ({ file }));
          const total = state.files.reduce((s, x) => s + x.file.size, 0);
          stat.textContent = `${state.files.length} dosya seçildi · ${formatBytes(total)}`;
        };
        const save = el('button', { class:'btn' }, 'Yazıyı Yayınla');
        save.onclick = async () => {
          try {
            const total = state.files.reduce((s, x) => s + x.file.size, 0);
            if (total > 150 * 1024 * 1024) throw new Error('Toplam dosya boyutu 150 MB üstünde.');
            const media = await uploadFiles('blog');
            await api('/api/blog/save', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ idToken: state.idToken, title: title.value, content: content.value, media })});
            state.files = []; await loadBlog(); render();
          } catch (e) { alert(`Blog kaydedilemedi: ${e.message}`); }
        };
        blogComposer.append(title, content, files, stat, save);
      }
      left.appendChild(blogComposer);

      const aiCard = el('div', { class:'card' }, `<h3>AI Destek</h3>`);
      const q = el('input', { placeholder:'Sorunu yaz' });
      const provider = el('select'); provider.innerHTML = `<option value='chatgpt'>ChatGPT</option><option value='gemini'>Gemini</option>`;
      const ask = el('button', { class:'btn' }, 'Yanıtla');
      const out = el('div', { class:'small muted' });
      ask.onclick = async () => {
        try {
          out.textContent = 'Yanıt bekleniyor...';
          const data = await api(`/api/help/${provider.value}`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ question:q.value }) });
          out.textContent = data.answer || 'Yanıt yok.';
        } catch { out.textContent = 'AI servisine ulaşılamadı.'; }
      };
      aiCard.append(q, provider, ask, out);

      const appCard = el('div', { class:'card' }, `<h3>Uygulamalar</h3><div id='apps-list' class='list'></div>`);
      const appsList = appCard.querySelector('#apps-list');
      if (!state.apps.length) appsList.innerHTML = `<div class='post small muted'>Henüz uygulama eklenmedi.</div>`;
      state.apps.forEach(a => appsList.appendChild(el('div', { class:'post' }, `<strong>${a.name}</strong><p class='small muted'>${a.description}</p><a href='${a.url}' target='_blank' rel='noreferrer'>Aç</a>`)));

      const appComposer = el('div', { class:'card' }, `<h3>Uygulama Ekle (Sadece Yönetici)</h3>`);
      const canAdmin = state.user && (ADMIN_EMAIL ? state.user.email === ADMIN_EMAIL : true);
      if (!canAdmin) {
        appComposer.appendChild(el('p', { class:'small muted' }, 'Bu alan yalnızca yönetici için aktif. Backend, ADMIN_EMAIL ile zorunlu doğrulama yapar.'));
      } else {
        const name = el('input', { placeholder:'Uygulama adı' });
        const desc = el('textarea', { placeholder:'Kısa açıklama' });
        const url = el('input', { placeholder:'https://...' });
        const save = el('button', { class:'btn' }, 'Uygulamayı Ekle');
        save.onclick = async () => {
          try {
            await api('/api/apps/save', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ idToken: state.idToken, name:name.value, description:desc.value, url:url.value }) });
            await loadApps(); render();
          } catch (e) { alert(`Uygulama eklenemedi: ${e.message}`); }
        };
        appComposer.append(name, desc, url, save);
      }

      right.append(aiCard, appCard, appComposer);
      grid.append(left, right);
      app.append(hero, grid);
    }

    async function onGoogleSignIn(response){
      const payload = decodeJwt(response.credential);
      state.user = { email: payload.email, name: payload.name };
      state.idToken = response.credential;
      renderAuth();
      render();
    }
    window.onGoogleSignIn = onGoogleSignIn;

    (async function init(){
      renderAuth();
      try { await Promise.all([loadBlog(), loadApps()]); } catch {}
      render();
    })();
  </script>
</body>
</html>
